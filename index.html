<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caderno Pro - Ednilton Morais</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --sidebar-bg: #2c3e50;
            --text-main: #333333;
            --text-side: #ffffff;
            --white: #ffffff;
            --border: #eeeeee;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
        }

        [data-theme="dark"] {
            --primary: #1a1a1a;
            --accent: #2980b9;
            --bg: #121212;
            --sidebar-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-side: #cccccc;
            --white: #1e1e1e;
            --border: #333333;
        }

        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text-main); }

        /* Sidebar */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); color: var(--text-side);
            display: flex; flex-direction: column; padding: 15px;
            position: absolute; height: 100%; z-index: 100;
            transition: transform 0.3s ease; transform: translateX(-100%);
            border-right: 1px solid var(--border);
        }
        #sidebar.open { transform: translateX(0); }
        #overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 90; }
        #overlay.active { display: block; }

        .dev-signature {
            font-size: 0.8rem; color: var(--accent); text-align: center;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 5px; opacity: 0.9;
        }

        .btn-add { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; width: 100%; font-size: 1rem; }
        .btn-add:active { opacity: 0.8; }
        
        #search-bar { padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; background: rgba(255,255,255,0.1); color: white; outline: none; width: 100%; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 8px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: #95a5a6; letter-spacing: 1.2px; font-weight: bold; }
        
        .btn-clear-trash { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; padding: 5px; border-radius: 4px; }
        .btn-clear-trash:hover { background: rgba(255, 71, 87, 0.1); }

        #page-list, #trash-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; }
        
        .page-item {
            padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem;
            background: rgba(255,255,255,0.03);
        }
        .page-item:hover { background: rgba(255,255,255,0.08); }
        .page-item.active { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .btn-icon { border: none; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; }
        .btn-restore { background: #27ae60; }
        .btn-hard-del { background: #e74c3c; }
        .btn-to-trash { background: rgba(255,255,255,0.15); color: #ecf0f1; }

        .actions-group { display: flex; gap: 6px; }

        .backup-zone { margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-backup { background: #4b6584; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: bold; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; width: 100%; }
        header { background: var(--white); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        
        #editor-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #note-title { width: 100%; max-width: 800px; font-size: 2rem; font-weight: 800; border: none; background: transparent; color: var(--accent); outline: none; margin-bottom: 10px; }
        #note-content { width: 100%; max-width: 800px; flex-grow: 1; font-size: 1.15rem; line-height: 1.8; outline: none; min-height: 300px; color: var(--text-main); }

        [contenteditable]:empty:before { content: attr(data-placeholder); color: #bdc3c7; }

        @media (min-width: 768px) {
            #sidebar { position: relative; transform: translateX(0); }
            #menu-toggle { display: none; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<aside id="sidebar">
    <div class="dev-signature">Dev: Ednilton Morais</div>
    <h2 style="text-align:center; margin-top: 0; margin-bottom: 20px;">📓 Meu Caderno</h2>
    <input type="text" id="search-bar" placeholder="🔍 Buscar notas..." oninput="renderAll()">
    <button class="btn-add" id="btn-new-note" onclick="createNewPage()">+ Nova Nota</button>
    
    <div class="section-header"><span class="section-title">Notas Ativas</span></div>
    <ul id="page-list"></ul>

    <div class="section-header">
        <span class="section-title">Lixeira</span>
        <button class="btn-clear-trash" onclick="emptyTrash()">Limpar Tudo</button>
    </div>
    <ul id="trash-list"></ul>

    <div class="backup-zone">
        <button class="btn-backup" onclick="exportBackup()">📤 Backup</button>
        <button class="btn-backup" onclick="document.getElementById('fileInput').click()">📥 Restore</button>
        <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importBackup(event)">
    </div>
</aside>

<main id="main-content">
    <header>
        <div style="display:flex; align-items:center;">
            <button id="menu-toggle" onclick="toggleMenu()" style="background:var(--primary); color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">☰</button>
            <span id="status" style="font-size: 0.75rem; margin-left: 15px; font-weight: bold; color: #95a5a6;">Pronto</span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.4rem;">🌓</button>
            <button class="btn-add" onclick="exportToTXT()" style="width:auto; margin:0; padding: 8px 15px; background: var(--primary)">Exportar TXT</button>
        </div>
    </header>

    <div id="editor-container">
        <input type="text" id="note-title" placeholder="Título" oninput="save(true)">
        <div id="note-content" contenteditable="true" data-placeholder="Comece a escrever aqui..." oninput="save(false)"></div>
    </div>
</main>

<script>
    let notes = [];
    let trash = [];
    let currentId = null;

    // Inicialização Blindada
    function init() {
        try {
            notes = JSON.parse(localStorage.getItem('notes-v7')) || [];
            trash = JSON.parse(localStorage.getItem('trash-v7')) || [];
        } catch(e) {
            notes = []; trash = [];
        }
        // Validação de integridade do currentId inicial
        currentId = (notes.length > 0) ? notes[0].id : null;
        renderAll();
        loadNote();
    }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }
    if(localStorage.getItem('theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));

    const editor = document.getElementById('note-content');
    const titleInput = document.getElementById('note-title');

    function loadNote() {
        const note = notes.find(n => n.id === currentId);
        if(note && currentId !== null) {
            titleInput.value = note.title || '';
            editor.innerHTML = note.content || '';
            titleInput.disabled = false;
            editor.contentEditable = true;
        } else {
            titleInput.value = ''; 
            editor.innerHTML = '';
            titleInput.disabled = true; 
            editor.contentEditable = false;
        }
    }

    function save(shouldRenderList = false) {
        // SEGURANÇA: Aborta se tentar salvar estado inexistente
        if(currentId === null) return;
        const note = notes.find(n => n.id === currentId);
        if(!note) return;

        note.title = titleInput.value;
        note.content = editor.innerHTML;
        
        // Persistência Atômica
        localStorage.setItem('notes-v7', JSON.stringify(notes));
        localStorage.setItem('trash-v7', JSON.stringify(trash));
        
        const status = document.getElementById('status');
        status.innerText = "Salvando...";
        clearTimeout(window.statusTimer);
        window.statusTimer = setTimeout(() => status.innerText = "Salvo", 500);
        
        if(shouldRenderList) renderAll();
    }

    function createNewPage() {
        const btn = document.getElementById('btn-new-note');
        if(btn.disabled) return;
        btn.disabled = true;

        // Limpa busca para evitar conflitos de renderização
        document.getElementById('search-bar').value = '';

        const newId = Date.now();
        const newNote = { id: newId, title: '', content: '' };
        notes.unshift(newNote);
        currentId = newId;
        
        localStorage.setItem('notes-v7', JSON.stringify(notes));
        
        loadNote(); 
        renderAll(); 
        
        if(window.innerWidth < 768) toggleMenu();
        titleInput.focus();
        setTimeout(() => btn.disabled = false, 400);
    }

    function moveToTrash(id, e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        if(confirm("Mover nota para a lixeira?")) {
            const idx = notes.findIndex(n => n.id === id);
            if(idx !== -1) {
                const deletedNote = notes.splice(idx, 1)[0];
                trash.unshift(deletedNote);
                
                // SEGURANÇA: Reseta o ponteiro antes de carregar a próxima para evitar vazamento de texto
                if(currentId === id) {
                    currentId = (notes.length > 0) ? notes[0].id : null;
                }
                
                localStorage.setItem('notes-v7', JSON.stringify(notes));
                localStorage.setItem('trash-v7', JSON.stringify(trash));
                
                loadNote(); 
                renderAll(); 
            }
        }
    }

    function restore(id, e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        const idx = trash.findIndex(n => n.id === id);
        if(idx !== -1) {
            notes.unshift(trash.splice(idx, 1)[0]);
            localStorage.setItem('notes-v7', JSON.stringify(notes));
            localStorage.setItem('trash-v7', JSON.stringify(trash));
            renderAll();
        }
    }

    function hardDel(id, e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        if(confirm("Excluir permanentemente?")) {
            trash = trash.filter(n => n.id !== id);
            localStorage.setItem('trash-v7', JSON.stringify(trash));
            renderAll();
        }
    }

    function emptyTrash() {
        if(trash.length === 0) return;
        if(confirm("Limpar toda a lixeira permanentemente?")) {
            trash = []; 
            localStorage.setItem('trash-v7', JSON.stringify(trash));
            renderAll();
        }
    }

    function renderAll() {
        const term = document.getElementById('search-bar').value.toLowerCase();
        
        const renderList = (data, listId, isTrash) => {
            const el = document.getElementById(listId);
            el.innerHTML = ''; 
            
            const filtered = data.filter(n => (n.title || '').toLowerCase().includes(term));
            
            filtered.forEach(n => {
                const li = document.createElement('li');
                // Validação rigorosa da classe ativa
                li.className = `page-item ${ (n.id === currentId && !isTrash) ? 'active' : '' }`;
                li.onclick = () => { 
                    if(!isTrash) { 
                        currentId = n.id; 
                        loadNote(); 
                        renderAll(); 
                        if(window.innerWidth < 768) toggleMenu(); 
                    } 
                };
                li.innerHTML = `
                    <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:70%">${n.title || 'Sem título'}</span>
                    <div class="actions-group">
                        ${isTrash ? 
                            `<button class="btn-icon btn-restore" onclick="restore(${n.id}, event)" title="Restaurar">↩</button>
                             <button class="btn-icon btn-hard-del" onclick="hardDel(${n.id}, event)" title="Apagar">✕</button>` :
                            `<button class="btn-icon btn-to-trash" onclick="moveToTrash(${n.id}, event)" title="Lixeira">🗑️</button>`
                        }
                    </div>
                `;
                el.appendChild(li);
            });
        }
        renderList(notes, 'page-list', false);
        renderList(trash, 'trash-list', true);
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function exportBackup() {
        const data = { notes, trash, date: new Date().toISOString(), version: "7.1" };
        const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup-meu-caderno.json`;
        a.click();
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (confirm("Restaurar backup? Isso substituirá as notas atuais.")) {
                    notes = imported.notes || []; 
                    trash = imported.trash || [];
                    currentId = (notes.length > 0) ? notes[0].id : null;
                    localStorage.setItem('notes-v7', JSON.stringify(notes));
                    localStorage.setItem('trash-v7', JSON.stringify(trash));
                    loadNote(); renderAll();
                }
            } catch { alert("Falha na importação: Arquivo corrompido ou inválido."); }
        };
        reader.readAsText(file);
        event.target.value = ''; // Reseta o input de arquivo
    }

    function exportToTXT() {
        const note = notes.find(n => n.id === currentId);
        if(!note) return;
        // Usa innerText para preservar quebras de linha reais
        const plainText = editor.innerText;
        const content = `TÍTULO: ${note.title || 'Sem título'}\n\n${plainText}`;
        const blob = new Blob([content], {type: "text/plain;charset=utf-8"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${(note.title || 'nota').replace(/[/\\?%*:|"<>]/g, '_')}.txt`;
        a.click();
    }

    init();
</script>

</body>
</html>
